<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMOSD自己負担額シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .sticky-panel { position: sticky; top: 0; z-index: 50; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            // --- 初期状態は未選択(null)に設定 ---
            const [params, setParams] = useState({
                severity: null, 
                nanbyoIncome: null,
                kogakuIncome: null,
                enspCycle: '3',
                fukaKyufu: false,
                jichitai: false,
                displayType: 'year',
                periodTab: 'after'
            });

            // --- 計算ロジック ---
            const calculateCost = () => {
                // 未選択時は計算しない
                if (!params.severity || !params.nanbyoIncome) return null;

                const isHeavy = params.severity === 'heavy';
                const isFirstYear = params.periodTab === 'first';

                // 1. 難病上限額の設定
                const nanbyoLimits = { '80': 2500, '160': 5000, '370': 10000, '810': 20000, 'over': 30000 };
                const nanbyoLongLimits = { '80': 2500, '160': 5000, '370': 5000, '810': 10000, 'over': 20000 };

                // 助成適用後の月額を比較（付加給付2.5万との比較含む）
                const getMonthlyFinal = (standardLimit) => {
                    if (params.jichitai) return 0;
                    let final = standardLimit;
                    if (params.fukaKyufu) {
                        final = Math.min(standardLimit, 25000);
                    }
                    return final;
                };

                // 高額療養費の月額計算
                const getKogakuLimit = (yakka) => {
                    if (params.jichitai) return 0;
                    if (!params.kogakuIncome) return 0;
                    let limit = 0;
                    switch(params.kogakuIncome) {
                        case 'hikazei': limit = 35400; break;
                        case '370': limit = 57600; break;
                        case '770': limit = 80100 + (yakka - 267000) * 0.01; break;
                        case '1160': limit = 167400 + (yakka - 558000) * 0.01; break;
                        case 'over': limit = 252600 + (yakka - 842000) * 0.01; break;
                    }
                    return params.fukaKyufu ? Math.min(limit, 25000) : limit;
                };

                // --- 1. エンスプリング ---
                const enspYakkaPerDose = 1150216;
                const enspPayCount = 12 / parseInt(params.enspCycle);
                let enspAnnual = 0;
                let enspNote = "";

                if (isHeavy) {
                    if (params.enspCycle === '3') {
                        // 3ヶ月処方(年4回)は「高額かつ長期」対象外 -> 一般
                        enspAnnual = getMonthlyFinal(nanbyoLimits[params.nanbyoIncome]) * enspPayCount;
                        enspNote = "難病助成(一般)";
                    } else {
                        // 1,2ヶ月処方は年6回以上なので「高額かつ長期」
                        enspAnnual = getMonthlyFinal(nanbyoLongLimits[params.nanbyoIncome]) * enspPayCount;
                        enspNote = "高額かつ長期";
                    }
                } else {
                    // 軽症（軽症高額特例）
                    const limit = getMonthlyFinal(nanbyoLimits[params.nanbyoIncome]);
                    if (isFirstYear) {
                        const kogaku = getKogakuLimit(enspYakkaPerDose * parseInt(params.enspCycle));
                        const first3Count = Math.min(3, enspPayCount);
                        enspAnnual = (kogaku * first3Count) + (limit * (enspPayCount - first3Count));
                        enspNote = "待機期間含";
                    } else {
                        enspAnnual = limit * enspPayCount;
                        enspNote = "軽症高額特例";
                    }
                }

                // --- 2. ユプリズナ ---
                const uplYakkaPerDose = 10485912;
                let uplAnnual = 0;
                let uplNote = "";
                if (isHeavy) {
                    // 年2回：一般区分
                    uplAnnual = getMonthlyFinal(nanbyoLimits[params.nanbyoIncome]) * 2;
                    uplNote = "難病助成(一般)";
                } else {
                    uplAnnual = getKogakuLimit(uplYakkaPerDose) * 2;
                    uplNote = "高額療養費";
                }

                // --- 3. ユルトミリス ---
                const ultYakkaPerDose = 7259835;
                let ultAnnual = 0;
                let ultNote = "";
                if (isHeavy) {
                    // 年6回：高額長期
                    ultAnnual = getMonthlyFinal(nanbyoLongLimits[params.nanbyoIncome]) * 6;
                    ultNote = "高額かつ長期";
                } else {
                    const limit = getMonthlyFinal(nanbyoLimits[params.nanbyoIncome]);
                    if (isFirstYear) {
                        ultAnnual = (getKogakuLimit(ultYakkaPerDose) * 3) + (limit * 3);
                        ultNote = "待機期間含";
                    } else {
                        ultAnnual = limit * 6;
                        ultNote = "軽症高額特例";
                    }
                }

                // 1000円未満切り捨て処理
                const format = (val) => Math.floor(val / 1000) * 1000;

                return [
                    { name: 'エンスプリング', cost: format(enspAnnual), color: 'bg-amber-500', note: enspNote },
                    { name: 'ユプリズナ', cost: format(uplAnnual), color: 'bg-blue-500', note: uplNote },
                    { name: 'ユルトミリス', cost: format(ultAnnual), color: 'bg-emerald-500', note: ultNote }
                ];
            };

            const results = useMemo(calculateCost, [params]);
            const maxCost = results ? Math.max(...results.map(r => r.cost), 100000) : 100000;

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-white border-b px-4 py-6 shadow-sm">
                        <h1 className="text-xl font-bold text-slate-800 text-center flex items-center justify-center gap-2">
                            NMOSD自己負担額シミュレーター
                        </h1>
                    </header>

                    <div className="sticky-panel bg-orange-50/95 backdrop-blur-md border-b shadow-md p-4 min-h-[180px] flex flex-col justify-center">
                        <div className="max-w-2xl mx-auto w-full">
                            {!results ? (
                                <p className="text-center text-slate-400 font-medium py-10">条件を選択すると計算結果が表示されます</p>
                            ) : (
                                <div className="fade-in">
                                    <div className="flex bg-white rounded-lg p-1 mb-4 shadow-inner">
                                        <button onClick={() => setParams({...params, periodTab: 'first'})} className={`flex-1 py-2 text-xs font-bold rounded-md transition ${params.periodTab === 'first' ? 'bg-orange-200 text-orange-900' : 'text-slate-400'}`}>1年目</button>
                                        <button onClick={() => setParams({...params, periodTab: 'after'})} className={`flex-1 py-2 text-xs font-bold rounded-md transition ${params.periodTab === 'after' ? 'bg-orange-200 text-orange-900' : 'text-slate-400'}`}>2年目以降</button>
                                    </div>
                                    <div className="flex justify-end mb-2">
                                        <button onClick={() => setParams({...params, displayType: params.displayType === 'year' ? 'month' : 'year'})} className="text-[10px] font-bold bg-white border border-slate-300 px-3 py-1 rounded-full shadow-sm">
                                            {params.displayType === 'year' ? '月額換算を表示' : '年間合計を表示'}
                                        </button>
                                    </div>
                                    <div className="space-y-4">
                                        {results.map((r) => {
                                            const val = params.displayType === 'year' ? r.cost : Math.floor(r.cost / 12);
                                            return (
                                                <div key={r.name}>
                                                    <div className="flex justify-between items-end mb-1">
                                                        <span className="text-xs font-bold">{r.name} <span className="text-[9px] font-normal bg-white px-1 border rounded ml-1">{r.note}</span></span>
                                                        <span className="text-sm font-bold text-orange-700">約{val.toLocaleString()}円</span>
                                                    </div>
                                                    <div className="w-full bg-white/50 rounded-full h-3 overflow-hidden border border-slate-200">
                                                        <div className={`h-full ${r.color} transition-all duration-700`} style={{ width: `${(r.cost / maxCost) * 100}%` }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <main className="max-w-2xl mx-auto p-4 mt-6 space-y-8">
                        <section className="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                            <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Step 1: 判定・所得条件</h2>
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-2">重症度</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {['heavy', 'light'].map(v => (
                                            <button key={v} onClick={() => setParams({...params, severity: v})} className={`py-3 text-sm rounded-lg border transition ${params.severity === v ? 'bg-slate-800 text-white font-bold' : 'bg-white text-slate-500 border-slate-200'}`}>
                                                {v === 'heavy' ? '重症認定あり' : '重症認定なし(軽症)'}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-2">難病所得区分</label>
                                    <select value={params.nanbyoIncome || ''} onChange={(e) => setParams({...params, nanbyoIncome: e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-4 text-sm outline-none">
                                        <option value="" disabled>選択してください</option>
                                        <option value="80">低所得Ⅰ (~80万)</option>
                                        <option value="160">低所得Ⅱ (~160万)</option>
                                        <option value="370">一般所得Ⅰ (~370万)</option>
                                        <option value="810">一般所得Ⅱ (~810万)</option>
                                        <option value="over">上位所得 (810万~)</option>
                                    </select>
                                </div>
                                {params.severity === 'light' && (
                                    <div className="fade-in">
                                        <label className="block text-xs font-bold text-slate-600 mb-2">高額療養費 所得区分</label>
                                        <select value={params.kogakuIncome || ''} onChange={(e) => setParams({...params, kogakuIncome: e.target.value})} className="w-full bg-orange-50 border border-orange-100 rounded-lg py-3 px-4 text-sm outline-none">
                                            <option value="" disabled>選択してください</option>
                                            <option value="hikazei">住民税非課税</option>
                                            <option value="370">~年収 370万</option>
                                            <option value="770">~年収 770万</option>
                                            <option value="1160">~年収 1160万</option>
                                            <option value="over">年収 1160万~</option>
                                        </select>
                                    </div>
                                )}
                            </div>
                        </section>

                        <section className="bg-white rounded-xl shadow-sm p-6 border border-slate-200">
                            <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Step 2: 製剤・助成条件</h2>
                            <div className="space-y-6">
                                <div>
                                    <label className="block text-xs font-bold text-slate-600 mb-2">エンスプリング処方期間</label>
                                    <div className="grid grid-cols-3 gap-2">
                                        {[1, 2, 3].map(m => (
                                            <button key={m} onClick={() => setParams({...params, enspCycle: m.toString()})} className={`py-2 text-xs rounded-md border transition ${params.enspCycle === m.toString() ? 'bg-amber-500 text-white border-amber-600 font-bold' : 'bg-slate-50 text-slate-500'}`}>
                                                {m}ヶ月分
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <label className="flex items-center justify-between p-4 bg-slate-50 rounded-lg cursor-pointer border border-transparent hover:border-slate-200">
                                        <span className="text-sm">付加給付あり (上限2.5万円/月)</span>
                                        <input type="checkbox" checked={params.fukaKyufu} onChange={(e) => setParams({...params, fukaKyufu: e.target.checked})} className="w-5 h-5 accent-slate-800"/>
                                    </label>
                                    <label className="flex items-center justify-between p-4 bg-slate-50 rounded-lg cursor-pointer border border-transparent hover:border-slate-200">
                                        <span className="text-sm">自治体助成あり (自己負担0)</span>
                                        <input type="checkbox" checked={params.jichitai} onChange={(e) => setParams({...params, jichitai: e.target.checked})} className="w-5 h-5 accent-slate-800"/>
                                    </label>
                                </div>
                            </div>
                        </section>
                        
                        <div className="text-center">
                           <button onClick={() => location.reload()} className="text-[10px] text-slate-400 underline uppercase tracking-tighter">データをクリアしてリセット</button>
                        </div>
                    </main>

                    <footer className="max-w-2xl mx-auto px-6 pb-12 text-[10px] text-slate-400 leading-relaxed text-center">
                        ※本ツールは概算値を示すものであり、実際の支払額は処方内容や各自治体、保険組合の規定により異なります。
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
